<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Это тебе Алён</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
    }

    .container {
      width: 90%;
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px;
    }

    .cards {
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
    }

    .card {
      flex: 1 1 calc(33.333% - 20px);
      background: #f2f2f2;
      padding: 20px;
      box-sizing: border-box;
      border-radius: 10px;
    }

    img {
      max-width: 100%;
      height: auto;
      display: block;
    }

    @media (max-width: 768px) {
      .card {
        flex: 1 1 100%;
      }
    }
  </style>
  <div class="container">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      min-height: 100%;
      overflow-x: hidden;
      font-family: Arial, sans-serif;
    }

    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      position: relative;
      background: linear-gradient(180deg, #2c1338 0%, #5c2a68 35%, #f08bb4 100%);
    }

    /* Движущийся фон */
    .background {
      position: fixed;
      inset: 0;
      overflow: hidden;
      z-index: 0;
      background:
        radial-gradient(circle at 20% 20%, rgba(255,255,255,0.12), transparent 20%),
        radial-gradient(circle at 80% 30%, rgba(255,255,255,0.08), transparent 25%),
        radial-gradient(circle at 50% 80%, rgba(255,255,255,0.06), transparent 20%);
    }

    .background::before,
    .background::after {
      content: "";
      position: absolute;
      inset: -20%;
      background: radial-gradient(circle, rgba(255,255,255,0.08) 2px, transparent 3px);
      background-size: 120px 120px;
      animation: moveBg 25s linear infinite;
      opacity: 0.4;
    }

    .background::after {
      animation-duration: 40s;
      animation-direction: reverse;
      opacity: 0.2;
      transform: scale(1.2);
    }

    @keyframes moveBg {
      from { transform: translate(0, 0); }
      to { transform: translate(-120px, -80px); }
    }

    /* Лепестки сакуры */
    #petals-container {
      position: fixed;
      inset: 0;
      overflow: hidden;
      z-index: 1;
      pointer-events: none;
    }

    .sakura-petal {
      position: absolute;
      top: -50px;
      width: 26px;
      height: 18px;
      pointer-events: auto;
      cursor: pointer;
      opacity: 0.95;
      transform-origin: center center;
      background: radial-gradient(circle at 30% 30%, #ffdbe8, #ff9fc2 70%, #f0729f 100%);
      border-radius: 70% 30% 70% 30%;
      box-shadow: 0 0 8px rgba(255, 182, 193, 0.45);
      animation-name: fall, sway, spin;
      animation-timing-function: linear, ease-in-out, linear;
      animation-iteration-count: infinite, infinite, infinite;
    }

    .sakura-petal::before {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: inherit;
      transform: rotate(35deg);
      background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.55), rgba(255,255,255,0.05));
    }

    @keyframes fall {
      from { transform: translateY(-10vh); }
      to { transform: translateY(110vh); }
    }

    @keyframes sway {
      0%   { margin-left: 0; }
      25%  { margin-left: 20px; }
      50%  { margin-left: -10px; }
      75%  { margin-left: 25px; }
      100% { margin-left: 0; }
    }

    @keyframes spin {
      from { rotate: 0deg; }
      to   { rotate: 360deg; }
    }

    .sakura-petal.burst {
      animation: flyAway 0.9s ease-out forwards !important;
      z-index: 5;
    }

    @keyframes flyAway {
      0% {
        transform: translate(0, 0) scale(1) rotate(0deg);
        opacity: 1;
      }
      30% {
        transform: translate(25px, -40px) scale(1.2) rotate(80deg);
        opacity: 1;
      }
      100% {
        transform: translate(140px, -180px) scale(0.4) rotate(280deg);
        opacity: 0;
      }
    }
    /* Карточка */
    .card {
      position: relative;
      z-index: 3;
      width: 100%;
      max-width: 850px;
      min-height: 580px;
      background: rgba(27, 32, 27, 0.92);
      border-radius: 35px;
      overflow: hidden;
      box-shadow: 0 20px 50px rgba(0,0,0,0.35);
      backdrop-filter: blur(6px);
    }

    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 18px 20px 0;
      gap: 12px;
      flex-wrap: wrap;
    }

    .title {
      text-align: center;
      color: #fff;
      font-size: 2rem;
      letter-spacing: 2px;
      font-family: cursive;
      width: 100%;
      margin-top: 8px;
    }

    .music-btn {
      border: none;
      background: #ff5f99;
      color: white;
      padding: 10px 16px;
      border-radius: 14px;
      cursor: pointer;
      font-size: 0.95rem;
      transition: 0.25s;
      box-shadow: 0 8px 20px rgba(255, 95, 153, 0.3);
    }

    .music-btn:hover {
      background: #ff3f86;
      transform: scale(1.04);
    }

    .garden {
      position: relative;
      width: 100%;
      height: 470px;
    }
    /* Большой цветок */
    .flower.big {
      position: absolute;
      left: 50%;
      bottom: 0;
      transform: translateX(-50%);
      width: 250px;
      height: 360px;
      animation: sway 3s ease-in-out infinite alternate;
      transform-origin: bottom center;
    }

    .stem {
      position: absolute;
      bottom: 0;
      left: 50%;
      transform: translateX(0);
      width: 10px;
      height: 185px;
      background: #50d36d;
      border-radius: 10px;
    }

    .leaf {
      position: absolute;
      width: 80px;
      height: 45px;
      background: #73db70;
      border-radius: 100px 0 100px 0;
      box-shadow: inset 0 0 8px rgba(0,0,0,0.15);
    }

    .leaf.left {
      bottom: 58px;
      left: 60px;
      transform: rotate(-110deg);
    }

    .leaf.right {
      bottom: 90px;
      right: 50px;
      transform: rotate(100deg) scaleX(-1);
      background: #73db70;
      border: 2px solid #50d36d;
    }

    .tag {
      position: absolute;
      right: 23px;
      bottom: 5px;
      background: #111;
      color: #fff;
      padding: 7px 12px;
      border-radius: 100px;
      font-size: 1rem;
      z-index: 3;
    }

    .petals {
      position: absolute;
      top: 35px;
      left: 50%;
      transform: translateX(-50%);
      width: 220px;
      height: 220px;
    }

    .petal {
      position: absolute;
      top: 50%;
      left: 55%;
      width: 70px;
      height: 100px;
      margin-left: -10px;
      margin-top: -40px;
      background: #ffd31c;
      border: none;
      border-radius: 50%;
      cursor: pointer;
      box-shadow: 0 0 15px rgba(255, 221, 80, 0.35);
      transition: transform 0.25s ease, filter 0.25s ease, box-shadow 0.25s ease;
      z-index: 2;
    }

    .petal:hover {
      filter: brightness(1.08);
      box-shadow: 0 0 20px rgba(255, 230, 120, 0.75);
    }

    .petal:active {
      transform: scale(0.96);
    }

    .petal1 { transform: translate(-50%, -50%) rotate(0deg) translateY(-78px); }
    .petal2 { transform: translate(-50%, -50%) rotate(45deg) translateY(-78px); }
    .petal3 { transform: translate(-50%, -50%) rotate(90deg) translateY(-78px); }
    .petal4 { transform: translate(-50%, -50%) rotate(135deg) translateY(-78px); }
    .petal5 { transform: translate(-50%, -50%) rotate(180deg) translateY(-78px); }
    .petal6 { transform: translate(-50%, -50%) rotate(225deg) translateY(-78px); }
    .petal7 { transform: translate(-50%, -50%) rotate(270deg) translateY(-78px); }
    .petal8 { transform: translate(-50%, -50%) rotate(315deg) translateY(-78px); }

    .center {
      position: absolute;
      top: 35%;
      left: 50%;
      width: 88px;
      height: 88px;
      transform: translate(-50%, -50%);
      background: radial-gradient(circle, #bc650e 45%, #82501d 70%, #5c3817 100%);
      border-radius: 50%;
      box-shadow: 0 0 0 10px rgba(214,169,78,0.35);
      z-index: 4;
    }

    /* Маленькие цветы */
    .flower.small {
      position: absolute;
      bottom: 0;
      width: 100px;
      height: 180px;
      animation: sway 3s ease-in-out infinite alternate;
      transform-origin: bottom center;
    }

    .flower.small.left {
      left: 23%;
      animation-duration: 2.4s;
    }

    .flower.small.right {
      right: 18%;
      animation-duration: 3.5s;
    }

    .flower.small .stem {
      height: 130px;
      width: 5px;
    }

    .flower.small .petals {
      top: 80px;
      width: 55px;
      height: 55px;
    }

    .flower.small .petals div {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 22px;
      height: 28px;
      margin-left: 0px;
      margin-top: -40px;
      background: #ffd31c;
      border-radius: 100%;
    }

    .flower.small .petals div:nth-child(1) { transform: translate(-50%, -50%) rotate(0deg) translateY(-22px); }
    .flower.small .petals div:nth-child(2) { transform: translate(-50%, -50%) rotate(60deg) translateY(-22px); }
    .flower.small .petals div:nth-child(3) { transform: translate(-50%, -50%) rotate(120deg) translateY(-22px); }
    .flower.small .petals div:nth-child(4) { transform: translate(-50%, -50%) rotate(180deg) translateY(-22px); }
    .flower.small .petals div:nth-child(5) { transform: translate(-50%, -50%) rotate(240deg) translateY(-22px); }
    .flower.small .petals div:nth-child(6) { transform: translate(-50%, -50%) rotate(300deg) translateY(-22px); }

    .flower.small .center {
      width: 100px;
      height: 100px;
      box-shadow: 0 0 0 4px rgba(214,169,78,0.25);
    }

    /* Модальное окно */
    .modal {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.55);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 100;
      padding: 20px;
    }

    .modal.show {
      display: flex;
    }

    .modal-content {
      width: 100%;
      max-width: 420px;
      background: #fff;
      border-radius: 24px;
      padding: 24px;
      text-align: center;
      box-shadow: 0 15px 40px rgba(0,0,0,0.3);
      animation: pop 0.25s ease;
      position: relative;
    }

    .modal-content h2 {
      margin-bottom: 12px;
      color: #c2185b;
      font-size: 1.5rem;
    }

    .modal-content p {
      font-size: 1.05rem;
      color: #333;
      line-height: 1.5;
      margin-bottom: 15px;
    }

    .modal-content img {
      width: 100%;
      max-height: 240px;
      object-fit: cover;
      border-radius: 16px;
      display: none;
      margin-top: 10px;
    }

    .close-btn {
      margin-top: 18px;
      padding: 10px 18px;
      border: none;
      border-radius: 12px;
      background: #ff3f86;
      color: #fff;
      font-size: 1rem;
      cursor: pointer;
    }

    .close-x {
      position: absolute;
      top: 12px;
      right: 16px;
      background: transparent;
      border: none;
      font-size: 24px;
      cursor: pointer;
      color: #666;
    }

    @keyframes sway {
      from { transform: translateX(-50%) rotate(-2deg); }
      to { transform: translateX(-50%) rotate(2deg); }
    }

    @keyframes pop {
      from {
        transform: scale(0.9);
        opacity: 0;
      }
      to {
        transform: scale(1);
        opacity: 1;
      }
    }

    .flower.small.left,
    .flower.small.right {
      transform: none;
    }

    @media (max-width: 700px) {
      .title {
        font-size: 1.6rem;
      }

      .flower.big {
        transform: translateX(-50%) scale(0.86);
      }

      @keyframes sway {
        from { transform: translateX(-50%) scale(0.86) rotate(-2deg); }
        to { transform: translateX(-50%) scale(0.86) rotate(2deg); }
      }

      .flower.small.left {
        left: 10%;
      }

      .flower.small.right {
        right: 8%;
      }
    }
  </style>
</head>
<body>
  <!-- Фон -->
  <div class="background"></div>

  <!-- Лепестки сакуры -->
  <div id="petals-container"></div>

  <div class="card">
    <h1 class="title">Не грусти)</h1>
  <div class="card">
    <div class="top-bar">
      <button class="music-btn" id="toggleMusic">▶ Включить музыку</button>
    </div>
    <div class="garden">
      <!-- Маленький цветок слева -->
      <div class="flower small left">
        <div class="stem"></div>
        <div class="petals">
          <div></div><div></div><div></div>
          <div></div><div></div><div></div>
          <div class="center"></div>
        </div>
      </div>

      <!-- Большой цветок -->
      <div class="flower big">
        <div class="stem"></div>
        <div class="leaf left"></div>
        <div class="leaf right"></div>
        <div class="tag">Нажми на лепестки</div>

        <div class="petals">
          <button class="petal petal1" data-type="text" data-title="Лепесток 1" data-content="Пусть каждый твой день будет наполнен теплом и улыбками 💛"></button>
          <button class="petal petal2" data-type="text" data-title="Лепесток 2" data-content="Ты — как солнце, делаешь мир ярче ☀️"></button>
          <button class="petal petal3" data-type="text" data-title="Лепесток 3" data-content="Желаю тебе счастья, любви и вдохновения каждый день 🌼"></button>
          <button class="petal petal4" data-type="text" data-title="Лепесток 4" data-content="Пусть сбудется всё, о чём мечтает твоё сердце 💖"></button>
          <button class="petal petal5" data-type="text" data-title="Лепесток 5" data-content="Спасибо, что ты есть. Ты очень особенный человек ✨"></button>
          <button class="petal petal6" data-type="text" data-title="Лепесток 6" data-content="Пусть любовь, нежность и радость всегда будут рядом 🤍"></button>
          <button class="petal petal7" data-type="text" data-title="Лепесток 7" data-content="Желаю тебе красивых моментов и незабываемых эмоций 🌷"></button>
          <button class="petal petal8" data-type="text" data-title="Лепесток 8" data-content="Ты заслуживаешь только самого прекрасного 💕"></button>

          <div class="center"></div>
        </div>
      </div>

      <!-- Маленький цветок справа -->
      <div class="flower small right">
        <div class="stem"></div>
        <div class="petals">
          <div></div><div></div><div></div>
          <div></div><div></div><div></div>
          <div class="center"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- Модальное окно -->
  <div class="modal" id="modal">
    <div class="modal-content">
      <button class="close-x" id="closeX">&times;</button>
      <h2 id="modalTitle">Заголовок</h2>
      <p id="modalText">Текст пожелания</p>
      <img id="modalImg" src="" alt="Картинка" />
      <button class="close-btn" id="closeBtn">Закрыть</button>
    </div>
  </div>
    <!-- Музыка -->
  <audio id="bgMusic" loop>
    <source src="music.mp3" type="audio/mpeg" />
    Ваш браузер не поддерживает audio.
  </audio>

  <script>
    /* =========================
       1. Музыка
    ========================= */
    const music = document.getElementById("bgMusic");
    const toggleMusicBtn = document.getElementById("toggleMusic");
    let musicPlaying = false;

    toggleMusicBtn.addEventListener("click", async () => {
      try {
        if (musicPlaying) {
          music.pause();
          toggleMusicBtn.textContent = "▶ Включить музыку";
        } else {
          await music.play();
          toggleMusicBtn.textContent = "⏸ Выключить музыку";
        }
        musicPlaying = !musicPlaying;
      } catch (error) {
        alert("Не удалось запустить музыку. Проверь файл music.mp3");
      }
    });
     /* =========================
       3. Падающие лепестки сакуры
    ========================= */
    const sakuraContainer = document.getElementById("petals-container");

    function createSakuraPetal() {
      const petal = document.createElement("div");
      petal.classList.add("sakura-petal");

      const size = Math.random() * 18 + 16;
      petal.style.width = `${size}px`;
      petal.style.height = `${size * 0.7}px`;
      petal.style.left = `${Math.random() * window.innerWidth}px`;

      const fallDuration = Math.random() * 6 + 8;
      const swayDuration = Math.random() * 3 + 2;
      const spinDuration = Math.random() * 5 + 4;
      const delay = Math.random() * 5;

      petal.style.animationDuration = `${fallDuration}s, ${swayDuration}s, ${spinDuration}s`;
      petal.style.animationDelay = `${delay}s, ${delay}s, ${delay}s`;

      const hue = Math.floor(Math.random() * 15);
      petal.style.filter = `hue-rotate(${hue}deg) brightness(${0.95 + Math.random() * 0.2})`;

      petal.addEventListener("click", () => {
        if (petal.classList.contains("burst")) return;
        petal.classList.add("burst");

        setTimeout(() => {
          petal.remove();
          createSakuraPetal();
        }, 900);
      });

      petal.addEventListener("animationend", (e) => {
        if (e.animationName === "fall" && !petal.classList.contains("burst")) {
          petal.remove();
          createSakuraPetal();
        }
      });

      sakuraContainer.appendChild(petal);
    }

    for (let i = 0; i < 25; i++) {
      createSakuraPetal();
    }

    setInterval(() => {
      if (sakuraContainer.children.length < 35) {
        createSakuraPetal();
      }
    }, 1200);
  </script>
  <script>
    const petals = document.querySelectorAll('.petal');
    const modal = document.getElementById('modal');
    const modalTitle = document.getElementById('modalTitle');
    const modalText = document.getElementById('modalText');
    const modalImg = document.getElementById('modalImg');
    const closeBtn = document.getElementById('closeBtn');
    const closeX = document.getElementById('closeX');

    petals.forEach((petal) => {
      petal.addEventListener('click', () => {
        const type = petal.dataset.type;
        const title = petal.dataset.title || 'Сообщение';
        const content = petal.dataset.content || '';

        modalTitle.textContent = title;

        if (type === 'image') {
          modalText.style.display = 'none';
          modalImg.style.display = 'block';
          modalImg.src = content;
        } else {
          modalImg.style.display = 'none';
          modalImg.src = '';
          modalText.style.display = 'block';
          modalText.textContent = content;
        }

        modal.classList.add('show');
      });
    });

    function closeModal() {
      modal.classList.remove('show');
    }

    closeBtn.addEventListener('click', closeModal);
    closeX.addEventListener('click', closeModal);

    modal.addEventListener('click', (e) => {
      if (e.target === modal) {
        closeModal();
      }
    });
  </script>
</body>
</html>
